layout: default

<style>
  /* 1. Hide the sidebar/header completely */
  header {
    display: none;
  }

  /* 2. Make the main content area take up 100% width */
  section {
    width: 100% !important;
    float: none !important;
    margin: 0 auto;
    max-width: 800px; /* Limits width slightly for better readability on big screens */
  }

  /* 3. Expand the outer container */
  .wrapper {
    max-width: 900px !important;
  }
</style>

{{ content }}
